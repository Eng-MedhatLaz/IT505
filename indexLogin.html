<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="Login Screen.css">
  <title>Ishraq System - Login</title>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <h1>Login Screen</h1>
    <span class="subtitle">Secure HCI-oriented prototype</span>
  </div>

  <!-- Body Layout -->
  <div class="layout">
    <!-- Main -->
    <div class="main">
      <div class="login-card">
        

        <!-- Info Box -->
        <div class="info-box">
          <h2>Welcome to Ishraq System</h2>
          <!-- <div class="tagline">Simple. Clear. Secure.</div> -->
          <!-- <ul>
            <li>Readable fonts and high contrast design</li>
            <li>Fast access to student and guardian data</li>
            <li>Search by name, code, and date</li>
          </ul> -->
        </div>

        <!-- Form -->
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="" autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="" autocomplete="current-password" />
        </div>
        <a href="Dashboard.html" class="btn-login">Log In</a>
        <a href="#" class="btn-login">sign up</a>
        <!-- <button class="btn-login" onclick="handleLogin()">Log In</button> -->

        <p class="demo-note">Demo note: accessible layout with clear labels</p>
      </div>
    </div>

  </div>


  <script src="Login Screen.js"></script>


</body>

</html>
